{% extends "base.html" %}
{% block title %}Login — AI Finance Advisor{% endblock %}
{% block auth_content %}
<div class="card" style="width:420px; padding:40px;">
  <div style="text-align:center; margin-bottom:28px;">
    <div style="font-size:48px;">💰</div>
    <h1 style="font-size:22px; font-weight:700; color:#e2e8f0; margin:8px 0 4px;">AI Finance Advisor</h1>
    <p style="color:#94a3b8; font-size:13px;">Smart money. Better future.</p>
  </div>

  <form method="POST">
    <div style="margin-bottom:14px;">
      <label style="color:#94a3b8; font-size:11px; display:block; margin-bottom:5px;">EMAIL ADDRESS</label>
      <input class="inp" type="email" name="email" required placeholder="you@email.com"/>
    </div>
    <div style="margin-bottom:22px;">
      <label style="color:#94a3b8; font-size:11px; display:block; margin-bottom:5px;">PASSWORD</label>
      <input class="inp" type="password" name="password" required placeholder="••••••••"/>
    </div>
    <button class="btn-blue" style="width:100%; font-size:15px; padding:12px;">Login →</button>
  </form>

  <p style="text-align:center; margin-top:18px; color:#94a3b8; font-size:13px;">
    No account?
    <a href="{{ url_for('register') }}" style="color:#4E9AF1; text-decoration:none;">Register here</a>
  </p>
</div>
{% endblock %}
